services:

  backend:
    build: ./backend
    container_name: zerotrace-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: zerotrace-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: unless-stopped