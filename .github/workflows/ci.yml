name: ZeroTrace CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build

  docker:

    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t zerotrace-backend ./backend

      - name: Build Frontend Image
        run: docker build -t zerotrace-frontend ./frontend

  sonarcloud:

    name: SonarCloud Scan

    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


            trivy:

    name: Trivy Security Scan

    runs-on: ubuntu-latest

    needs:
      - docker
      - sonarcloud

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t zerotrace-backend ./backend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: zerotrace-backend
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Build Frontend Image
        run: docker build -t zerotrace-frontend ./frontend

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: zerotrace-frontend
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL